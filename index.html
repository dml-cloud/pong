<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pong Classic</title>
    <link rel="icon" type="image/png" href="icon.png" sizes="180x180">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d1a; font-family: 'Press Start 2P', monospace; }
        body { display: flex; justify-content: center; align-items: center; }
        .game-container { position: relative; width: 100%; max-width: 480px; height: 100vh; height: 100dvh; background: #1a1a2e; overflow: hidden; }
        .game-container::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 10; }
        .game-container::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.3) 100%); pointer-events: none; z-index: 11; }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(26, 26, 46, 0.97); z-index: 20; gap: 20px; padding: 20px; }
        .overlay.hidden { display: none; }
        .title { font-size: clamp(20px, 7vw, 32px); color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); text-align: center; animation: glow 2s ease-in-out infinite alternate; }
        @keyframes glow { from { text-shadow: 0 0 10px rgba(255,255,255,0.3); } to { text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 40px rgba(0,255,136,0.4); } }
        .subtitle { font-size: clamp(8px, 2.5vw, 12px); color: #888; text-align: center; }
        .menu-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
        .btn { padding: 14px 20px; font-family: 'Press Start 2P', monospace; font-size: clamp(8px, 2.5vw, 11px); border: none; cursor: pointer; transition: all 0.15s ease; }
        .btn:active { transform: scale(0.96); }
        .btn-com { background: #00ff88; color: #1a1a2e; }
        .btn-online { background: #ff6b6b; color: #1a1a2e; }
        .btn-easy { background: #4ade80; color: #1a1a2e; }
        .btn-normal { background: #fbbf24; color: #1a1a2e; }
        .btn-hard { background: #f87171; color: #1a1a2e; }
        .btn-play { background: #fff; color: #1a1a2e; }
        .btn-back { background: transparent; border: 2px solid #555; color: #888; }
        .btn-copy { background: #6366f1; color: #fff; }
        .btn-small { padding: 10px 15px; font-size: 8px; }
        .difficulty-buttons { display: flex; flex-direction: column; gap: 10px; }
        .score-display { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 35px; z-index: 5; font-size: clamp(14px, 4vw, 22px); }
        .score-p1 { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
        .score-p2 { color: #ff6b6b; text-shadow: 0 0 10px rgba(255,107,107,0.5); }
        .mode-indicator { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); font-size: 7px; color: #666; z-index: 5; }
        .menu-btn { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; cursor: pointer; z-index: 15; display: none; justify-content: center; align-items: center; font-size: 16px; color: #888; }
        .menu-btn:active { background: rgba(255,255,255,0.2); }
        .footer { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 7px; color: #555; z-index: 5; white-space: nowrap; opacity: 0.7; }
        .winner-text { font-size: clamp(10px, 3vw, 14px); text-align: center; line-height: 2; }
        .winner-p1 { color: #00ff88; }
        .winner-p2 { color: #ff6b6b; }
        .instruction { font-size: 7px; color: #555; text-align: center; line-height: 2; }
        .menu-brand { font-size: 7px; color: #444; text-align: center; margin-top: 10px; }
        .online-code-box { background: rgba(0,0,0,0.3); border: 1px solid #444; padding: 15px; border-radius: 8px; width: 100%; max-width: 300px; }
        .code-display { background: #111; padding: 12px; border-radius: 4px; font-size: 10px; word-break: break-all; color: #0f0; margin: 10px 0; max-height: 60px; overflow-y: auto; font-family: monospace; text-align: center; }
        .btn-row { display: flex; gap: 10px; width: 100%; max-width: 300px; }
        .btn-row .btn { flex: 1; padding: 12px 10px; }
        .status-text { font-size: 8px; color: #888; text-align: center; min-height: 20px; }
        .waiting-text { color: #fbbf24; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        @media (orientation: landscape) { .landscape-warning { display: flex !important; } canvas, .overlay { display: none; } }
        .landscape-warning { display: none; position: fixed; inset: 0; background: #1a1a2e; color: #fff; font-family: 'Press Start 2P', monospace; font-size: 12px; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 100; }

        .splash-title { font-size: clamp(20px, 7vw, 32px); color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.8), 0 0 50px rgba(0,255,136,0.4); animation: glow 1.5s ease-in-out infinite alternate; }
        .splash-brand { font-size: 8px; color: #555; margin-top: 30px; opacity: 0; animation: fadeIn 1s ease-in 0s forwards; }
        #splashScreen { display: flex; flex-direction: column; justify-content: center; align-items: center; animation: fadeOutSplash 0.5s ease-out 4s forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOutSplash { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>
    <div class="landscape-warning">GIRA TU DISPOSITIVO<br><br>PORTRAIT MODE</div>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="score-display" id="scoreDisplay" style="display: none;">
            <span class="score-p1" id="scoreP1">0</span>
            <span class="score-p2" id="scoreP2">0</span>
        </div>
        <div class="mode-indicator" id="modeIndicator" style="display: none;"></div>
        <button class="menu-btn" id="menuBtn" title="Menú">☰</button>
        <div class="footer" id="footer" style="display: none;">DML Studios</div>

        <div class="overlay" id="splashScreen">
            <div class="splash-title">CLASSIC PONG</div>
            <div class="splash-brand">DML Studios</div>
        </div>

        <div class="overlay hidden" id="mainMenu">
            <div class="title">PONG</div>
            <div class="subtitle">CLASSIC</div>
            <div class="menu-buttons">
                <button class="btn btn-com" id="btnCOM">1 JUGADOR vs COM</button>
                <button class="btn btn-online" id="btnOnline">2 JUGADORES ONLINE</button>
            </div>
            <div class="instruction">TOCA LA PANTALLA PARA MOVER<br>LA PALETA</div>
            <div class="menu-brand">DML Studios</div>
        </div>

        <div class="overlay hidden" id="difficultyMenu">
            <div class="title">DIFICULTAD</div>
            <div class="difficulty-buttons">
                <button class="btn btn-easy" id="btnEasy">FÁCIL</button>
                <button class="btn btn-normal" id="btnNormal">NORMAL</button>
                <button class="btn btn-hard" id="btnHard">DIFÍCIL</button>
            </div>
            <button class="btn btn-back" id="btnBackFromDiff">← VOLVER</button>
        </div>

        <div class="overlay hidden" id="onlineMenu">
            <div class="title">ONLINE</div>
            <div class="menu-buttons">
                <button class="btn btn-com" id="btnCreateRoom">CREAR PARTIDA</button>
                <button class="btn btn-online" id="btnJoinRoom">UNIRSE A PARTIDA</button>
            </div>
            <button class="btn btn-back" id="btnBackFromOnline">← VOLVER</button>
        </div>

        <div class="overlay hidden" id="createRoomMenu">
            <div class="title">ESPERANDO...</div>
            <div class="online-code-box">
                <div class="status-text">Comparte este código con tu amigo:</div>
                <div class="code-display" id="roomCode">---</div>
            </div>
            <button class="btn btn-back btn-small" id="btnCancelCreate">CANCELAR</button>
        </div>

        <div class="overlay hidden" id="joinRoomMenu">
            <div class="title">UNIRSE</div>
            <div class="online-code-box">
                <div class="status-text">Pega el código de tu amigo:</div>
                <input type="text" class="code-display" id="joinCode" placeholder="Pega el código aquí..." style="width: 100%; color: #0f0; border: none; outline: none; resize: none; font-family: monospace;">
            </div>
            <button class="btn btn-copy" id="btnConnectJoin">CONECTAR</button>
            <button class="btn btn-back btn-small" id="btnCancelJoin">← VOLVER</button>
        </div>

        <div class="overlay hidden" id="connectingMenu">
            <div class="title">CONECTANDO</div>
            <div class="status-text waiting-text" id="connectingStatus">Esperando conexión...</div>
        </div>

        <div class="overlay hidden" id="gameOverMenu">
            <div class="title">JUEGO TERMINADO</div>
            <div class="winner-text" id="winnerText"></div>
            <button class="btn btn-play" id="btnPlayAgain">JUGAR OTRA VEZ</button>
            <button class="btn btn-back" id="btnMenuFinal">MENÚ</button>
        </div>
    </div>

    <script>
        // Audio
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(freq, duration, type = 'square') {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration / 1000);
            } catch(e) {}
        }
        function playPaddleHit() { playSound(440, 50); }
        function playWallBounce() { playSound(220, 30); }
        function playScore() { playSound(330, 100); setTimeout(() => playSound(220, 150), 100); }
        function playWin() { [0, 100, 200, 300].forEach((delay, i) => setTimeout(() => playSound(440 * Math.pow(2, i/4), 80), delay)); }

        // Game Constants
        const WINNING_SCORE = 11;
        const PADDLE_WIDTH_RATIO = 0.04;
        const PADDLE_HEIGHT_RATIO = 0.15;
        const BALL_RADIUS_RATIO = 0.012;
        const INITIAL_BALL_SPEED_RATIO = 0.012;
        const SPEED_INCREMENT = 1.05;
        const MAX_SPEED_MULTIPLIER = 2;
        const MAX_BOUNCE_ANGLE = Math.PI / 3;

        const DIFFICULTY = {
            EASY: { errorMargin: 0.30, reactionSpeed: 0.6, name: 'FÁCIL' },
            NORMAL: { errorMargin: 0.12, reactionSpeed: 0.85, name: 'NORMAL' },
            HARD: { errorMargin: 0.03, reactionSpeed: 1.1, name: 'DIFÍCIL' }
        };

        const GameState = { MENU: 'menu', PLAYING: 'playing', SCORED: 'scored', GAME_OVER: 'game_over' };

        let canvas, ctx;
        let gameState = GameState.MENU;
        let gameMode = 'com';
        let difficulty = DIFFICULTY.NORMAL;
        let score = { p1: 0, p2: 0 };
        let paddleWidth, paddleHeight, ballRadius, initialBallSpeed, ballSpeed;
        let paddle1Y, paddle2Y, paddle1TargetY, paddle2TargetY;
        let ballX, ballY, ballVX, ballVY, ballTrail = [];
        let lastTime = 0, scoredTimer = 0;
        const SCORED_DELAY = 1000;
        let touchLeft = { active: false, y: 0 };
        let touchRight = { active: false, y: 0 };

        // Online - declare in global scope
        var peer = null;
        var conn = null;
        var isHost = false;
        var isConnected = false;
        var connectionReady = false;
        var pendingMessages = [];
        var heartbeatInterval = null;
        var connectionCheckInterval = null;
        var lastHeartbeat = 0;
        var lastSyncTime = 0;
        const SYNC_INTERVAL = 100; // Send sync every 100ms

        // DOM Elements
        var mainMenu, difficultyMenu, onlineMenu, createRoomMenu, joinRoomMenu, connectingMenu, gameOverMenu;
        var scoreDisplay, modeIndicator, menuBtn, footer;
        var scoreP1El, scoreP2El, winnerText, roomCodeEl, joinCodeEl, connectingStatus;

        function hideAllOverlays() { [mainMenu, difficultyMenu, onlineMenu, createRoomMenu, joinRoomMenu, connectingMenu, gameOverMenu].forEach(el => el.classList.add('hidden')); }
        function showOverlay(overlay) { hideAllOverlays(); overlay.classList.remove('hidden'); }

        function initDOM() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            mainMenu = document.getElementById('mainMenu');
            difficultyMenu = document.getElementById('difficultyMenu');
            onlineMenu = document.getElementById('onlineMenu');
            createRoomMenu = document.getElementById('createRoomMenu');
            joinRoomMenu = document.getElementById('joinRoomMenu');
            connectingMenu = document.getElementById('connectingMenu');
            gameOverMenu = document.getElementById('gameOverMenu');
            scoreDisplay = document.getElementById('scoreDisplay');
            modeIndicator = document.getElementById('modeIndicator');
            menuBtn = document.getElementById('menuBtn');
            footer = document.getElementById('footer');
            scoreP1El = document.getElementById('scoreP1');
            scoreP2El = document.getElementById('scoreP2');
            winnerText = document.getElementById('winnerText');
            roomCodeEl = document.getElementById('roomCode');
            joinCodeEl = document.getElementById('joinCode');
            connectingStatus = document.getElementById('connectingStatus');

            document.getElementById('btnCOM').addEventListener('click', () => showOverlay(difficultyMenu));
            document.getElementById('btnOnline').addEventListener('click', () => showOverlay(onlineMenu));
            document.getElementById('btnBackFromDiff').addEventListener('click', () => showOverlay(mainMenu));
            document.getElementById('btnBackFromOnline').addEventListener('click', () => showOverlay(mainMenu));
            document.getElementById('btnEasy').addEventListener('click', () => startCOMGame(DIFFICULTY.EASY));
            document.getElementById('btnNormal').addEventListener('click', () => startCOMGame(DIFFICULTY.NORMAL));
            document.getElementById('btnHard').addEventListener('click', () => startCOMGame(DIFFICULTY.HARD));
            document.getElementById('btnCreateRoom').addEventListener('click', createRoom);
            document.getElementById('btnJoinRoom').addEventListener('click', () => { console.log('btnJoinRoom clicked, setting previousMenu = onlineMenu'); previousMenu = onlineMenu; showOverlay(joinRoomMenu); });
            document.getElementById('btnConnectJoin').addEventListener('click', () => { console.log('btnConnectJoin clicked, code element:', document.getElementById('joinCode'), 'value:', document.getElementById('joinCode').value); joinRoom(); });
            document.getElementById('btnCancelCreate').addEventListener('click', cancelOnline);
            document.getElementById('btnCancelJoin').addEventListener('click', cancelOnline);
            document.getElementById('btnPlayAgain').addEventListener('click', playAgain);
            document.getElementById('btnMenuFinal').addEventListener('click', showMainMenu);
            menuBtn.addEventListener('click', showMainMenu);

            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd, { passive: false });
            canvas.addEventListener('touchcancel', handleTouchEnd, { passive: false });
        }

        function resize() {
            const container = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);
            const w = container.clientWidth, h = container.clientHeight;
            paddleWidth = w * PADDLE_WIDTH_RATIO;
            paddleHeight = h * PADDLE_HEIGHT_RATIO;
            ballRadius = Math.max(w, h) * BALL_RADIUS_RATIO;
            initialBallSpeed = Math.min(w, h) * INITIAL_BALL_SPEED_RATIO;
        }

        function resetBall() {
            const container = canvas.parentElement;
            const w = container.clientWidth, h = container.clientHeight;
            ballX = w / 2; ballY = h / 2; ballSpeed = initialBallSpeed;
            const angle = (Math.random() * 0.5 - 0.25) * Math.PI;
            const direction = Math.random() < 0.5 ? 1 : -1;
            ballVX = Math.sin(angle) * ballSpeed * direction;
            ballVY = Math.cos(angle) * ballSpeed;
            ballTrail = [];
        }

        function resetGame() {
            const container = canvas.parentElement;
            const h = container.clientHeight;
            score = { p1: 0, p2: 0 };
            updateScoreDisplay();
            paddle1Y = paddle2Y = h / 2 - paddleHeight / 2;
            paddle1TargetY = paddle2TargetY = paddle1Y;
            resetBall();
        }

        function startCOMGame(diff) {
            initAudio();
            difficulty = diff; gameMode = 'com';
            resize(); resetGame();
            gameState = GameState.PLAYING;
            hideAllOverlays();
            scoreDisplay.style.display = 'flex';
            modeIndicator.style.display = 'block';
            modeIndicator.textContent = `1 JUGADOR vs ${diff.name}`;
            menuBtn.style.display = 'flex';
            footer.style.display = 'block';
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        // Online with PeerJS
        function generateShortCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        // Track previous menu for back navigation
        var previousMenu = null;

        function createRoom() {
            console.log('createRoom called');
            previousMenu = onlineMenu;
            showOverlay(createRoomMenu);
            initAudio();

            // Get roomCodeEl directly to ensure we have it
            var roomCodeElDirect = document.getElementById('roomCode');
            var connectingStatusDirect = document.getElementById('connectingStatus');

            // Generate and display code IMMEDIATELY before any async operations
            const code = generateShortCode();
            console.log('Generated code:', code);
            console.log('roomCodeEl:', roomCodeElDirect);

            // Update the display RIGHT NOW
            if (roomCodeElDirect) {
                roomCodeElDirect.textContent = code;
            }
            if (roomCodeEl) {
                roomCodeEl.textContent = code;
            }
            console.log('Code display updated to:', code);

            if (typeof Peer === 'undefined') {
                var errorStatus = connectingStatusDirect || connectingStatus;
                if (errorStatus) errorStatus.textContent = 'Error: Librería no cargada. Recarga la página.';
                return;
            }

            var status = connectingStatusDirect || connectingStatus;
            if (status) status.textContent = 'Esperando a tu amigo... (' + code + ')';

            // Cleanup previous peer if exists
            if (peer) {
                peer.destroy();
                peer = null;
            }

            try {
                // Use default PeerJS server with custom ID
                peer = new Peer('pong-' + code, {
                    debug: 2,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                });

                peer.on('open', (id) => {
                    console.log('Peer open with ID:', id);
                    connectingStatus.textContent = 'Esperando a tu amigo... (' + code + ')';
                });

                peer.on('connection', (c) => {
                    console.log('Incoming connection from:', c.peer);
                    if (conn) {
                        console.log('Closing existing connection');
                        conn.close();
                    }
                    conn = c;
                    isHost = true;
                    isConnected = true;
                    connectionReady = false;

                    conn.on('open', () => {
                        console.log('Host connection open');
                        connectingStatus.textContent = '¡Conectado! Sincronizando...';
                        // Send ready confirmation to guest
                        sendOnline({ type: 'host_ready' });
                        // Flush any pending messages
                        flushPendingMessages();
                    });

                    conn.on('data', (data) => {
                        console.log('Host received data:', data.type);
                        handleOnlineMessage(data);
                    });

                    conn.on('close', () => {
                        console.log('Connection closed');
                        handleDisconnect();
                    });

                    conn.on('error', (err) => {
                        console.error('Data channel error:', err);
                        connectingStatus.textContent = 'Error de conexión';
                    });
                });

                peer.on('error', (err) => {
                    console.error('PeerJS error:', err);
                    if (err.type === 'unavailable-id') {
                        roomCodeEl.textContent = 'Código en uso';
                        connectingStatus.textContent = 'Generando nuevo código...';
                        setTimeout(createRoom, 1500);
                    } else if (err.type === 'peer-unavailable') {
                        roomCodeEl.textContent = err.type;
                        connectingStatus.textContent = 'Código no válido';
                    } else if (err.type === 'network' || err.type === 'server-error') {
                        connectingStatus.textContent = 'Error de red, reintentando...';
                        setTimeout(() => {
                            if (peer) peer.destroy();
                            createRoom();
                        }, 2000);
                    } else {
                        connectingStatus.textContent = 'Error: ' + err.type;
                    }
                });

                peer.on('disconnected', () => {
                    console.log('Peer disconnected, attempting reconnect...');
                    connectingStatus.textContent = 'Reconectando...';
                    if (peer && !peer.destroyed) {
                        peer.reconnect();
                    }
                });

            } catch (err) {
                console.error('Peer creation error:', err);
                connectingStatus.textContent = 'Error: ' + err.message;
            }
        }

        function joinRoom() {
            // Get joinCodeEl directly to ensure we have it
            var joinCodeElDirect = document.getElementById('joinCode');
            var code = joinCodeElDirect ? joinCodeElDirect.value.trim().toUpperCase() : '';
            console.log('joinRoom called, code element value:', code);

            if (typeof Peer === 'undefined') {
                connectingStatus.textContent = 'Error: Librería no cargada. Recarga la página.';
                return;
            }

            if (!code) {
                connectingStatus.textContent = 'Introduce un código primero';
                return;
            }
            }

            previousMenu = onlineMenu;
            showOverlay(connectingMenu);
            connectingStatus.textContent = 'Conectando...';
            initAudio();

            // Cleanup previous peer if exists
            if (peer) {
                peer.destroy();
                peer = null;
            }

            try {
                peer = new Peer({
                    debug: 2,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' }
                        ]
                    }
                });

                // Connection timeout - if not connected in 15 seconds, show error
                var connectionTimeout = setTimeout(() => {
                    console.error('Connection timeout - guest did not connect in 15s');
                    connectingStatus.textContent = 'Timeout: No se pudo conectar al host';
                    if (peer && !peer.destroyed) peer.destroy();
                }, 15000);

                peer.on('open', () => {
                    console.log('Guest Peer open, ID:', peer.id);
                    console.log('Attempting connection to:', 'pong-' + code);
                    connectingStatus.textContent = 'Conectando al host...';
                    conn = peer.connect('pong-' + code, {
                        reliable: true,
                        serialization: 'json'
                    });
                    // Setup handlers BEFORE connection opens to avoid race conditions
                    isHost = false;
                    isConnected = true;
                    connectionReady = false;

                    conn.on('open', () => {
                        console.log('Guest connection open');
                        clearTimeout(connectionTimeout);
                        connectingStatus.textContent = '¡Conectado! Sincronizando...';
                        // Send ready confirmation to host
                        sendOnline({ type: 'guest_ready' });
                        // Flush any pending messages
                        flushPendingMessages();
                        // If we already received host_ready, start the game now
                        if (connectionReady) {
                            startOnlineGame(false);
                        }
                    });

                    conn.on('data', (data) => {
                        console.log('Guest received data:', data.type);
                        handleOnlineMessage(data);
                    });

                    conn.on('close', () => {
                        console.log('Connection closed');
                        clearTimeout(connectionTimeout);
                        handleDisconnect();
                    });

                    conn.on('error', (err) => {
                        console.error('Data channel error:', err);
                        clearTimeout(connectionTimeout);
                        connectingStatus.textContent = 'Error de conexión';
                    });
                });


                peer.on('error', (err) => {
                    clearTimeout(connectionTimeout);
                    console.error('PeerJS error:', err);
                    if (err.type === 'peer-unavailable') {
                        connectingStatus.textContent = 'Código no válido o host offline';
                    } else if (err.type === 'network' || err.type === 'server-error') {
                        connectingStatus.textContent = 'Error de red, reintentando...';
                        setTimeout(() => {
                            if (peer) peer.destroy();
                            joinRoom();
                        }, 2000);
                    } else {
                        connectingStatus.textContent = 'Error: ' + err.type;
                    }
                });

                peer.on('disconnected', () => {
                    console.log('Peer disconnected');
                    if (peer && !peer.destroyed) {
                        peer.reconnect();
                    }
                });

            } catch (err) {
                console.error('Peer creation error:', err);
                connectingStatus.textContent = 'Error: ' + err.message;
            }
        }

        function handleDisconnect() {
            isConnected = false;
            connectionReady = false;
            stopHeartbeat();
            if (gameState === GameState.PLAYING) {
                gameState = GameState.MENU;
            }
            connectingStatus.textContent = 'Conexión perdida';
            setTimeout(() => {
                cancelOnline();
                showOverlay(onlineMenu);
            }, 2000);
        }

        function startHeartbeat() {
            stopHeartbeat();
            heartbeatInterval = setInterval(() => {
                if (conn && conn.open && isConnected) {
                    sendOnline({ type: 'heartbeat', timestamp: Date.now() });
                    // Check if we haven't received anything in 10 seconds
                    if (lastHeartbeat && Date.now() - lastHeartbeat > 10000) {
                        console.log('Heartbeat timeout');
                        handleDisconnect();
                    }
                }
            }, 3000);
        }

        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            if (connectionCheckInterval) {
                clearInterval(connectionCheckInterval);
                connectionCheckInterval = null;
            }
        }

        function handleOnlineMessage(data) {
            lastHeartbeat = Date.now();

            if (data.type === 'heartbeat') {
                // Respond to heartbeat
                return;
            }

            if (data.type === 'host_ready') {
                console.log('Host is ready');
                if (!isHost) {
                    // Guest marks that host is ready
                    connectionReady = true;
                    // Request sync from host
                    sendOnline({ type: 'request_sync' });
                    // If connection is already open (we received conn.open before host_ready),
                    // start game now and wait for first sync
                    if (conn && conn.open) {
                        startOnlineGame(false);
                    }
                }
            } else if (data.type === 'guest_ready') {
                console.log('Guest is ready');
                if (isHost && isConnected) {
                    // Host starts game when guest confirms
                    startOnlineGame(true);
                }
            } else if (data.type === 'start') {
                startOnlineGame(false);
            } else if (data.type === 'input') {
                if (isHost) {
                    // Host receives guest's paddle position (right paddle)
                    paddle2TargetY = data.y;
                } else {
                    // Guest receives host's paddle position (left paddle)
                    paddle1TargetY = data.y;
                }
            } else if (data.type === 'paddle_input') {
                // Guest sends their paddle position
                paddle2TargetY = data.y;
            } else if (data.type === 'sync') {
                score = data.score;
                ballX = data.ballX; ballY = data.ballY;
                ballVX = data.ballVX; ballVY = data.ballVY;
                ballSpeed = data.ballSpeed;
                // Update paddle positions if provided
                if (data.paddle1Y !== undefined) paddle1TargetY = data.paddle1Y;
                if (data.paddle2Y !== undefined) paddle2TargetY = data.paddle2Y;
                updateScoreDisplay();
            } else if (data.type === 'scored') {
                score = data.score;
                updateScoreDisplay();
                checkWin(data.lastScorer);
            } else if (data.type === 'gameover') {
                endGame(data.winner);
            } else if (data.type === 'request_sync') {
                // Another peer requesting full state sync
                if (isHost) {
                    sendFullSync();
                }
            }
        }

        function sendOnline(data) {
            if (conn && conn.open) {
                conn.send(data);
            } else {
                // Queue message if connection not ready
                pendingMessages.push(data);
            }
        }

        function flushPendingMessages() {
            while (pendingMessages.length > 0 && conn && conn.open) {
                const msg = pendingMessages.shift();
                conn.send(msg);
            }
        }

        function cancelOnline() {
            console.log('cancelOnline called');
            stopHeartbeat();
            if (conn) {
                console.log('Closing conn');
                conn.close();
                conn = null;
            }
            if (peer) {
                console.log('Destroying peer');
                peer.destroy();
                peer = null;
            }
            conn = null;
            isConnected = false;
            isHost = false;
            connectionReady = false;
            pendingMessages = [];
            console.log('Going back to:', previousMenu);
            // Go back to previous menu, or default to onlineMenu
            if (previousMenu) {
                showOverlay(previousMenu);
                previousMenu = null;
            } else {
                showOverlay(onlineMenu);
            }
        }

        function startOnlineGame(isHostPlayer) {
            gameMode = 'online';
            resize(); resetGame();
            gameState = GameState.PLAYING;
            hideAllOverlays();
            scoreDisplay.style.display = 'flex';
            modeIndicator.style.display = 'block';
            modeIndicator.textContent = isHostPlayer ? 'ONLINE (HOST)' : 'ONLINE (GUEST)';
            menuBtn.style.display = 'flex';
            footer.style.display = 'block';

            // Start heartbeat
            startHeartbeat();
            lastHeartbeat = Date.now();

            if (isHost) {
                // Host sends initial sync to guest
                sendFullSync();
            }

            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function sendFullSync() {
            const container = canvas.parentElement;
            const w = container.clientWidth, h = container.clientHeight;
            sendOnline({
                type: 'sync',
                score: { ...score },
                ballX: ballX,
                ballY: ballY,
                ballVX: ballVX,
                ballVY: ballVY,
                ballSpeed: ballSpeed,
                paddle1Y: paddle1Y,
                paddle2Y: paddle2Y,
                canvasWidth: w,
                canvasHeight: h
            });
        }

        function playAgain() {
            resetGame();
            gameState = GameState.PLAYING;
            hideAllOverlays();
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function showMainMenu() {
            gameState = GameState.MENU;
            if (peer) cancelOnline();
            hideAllOverlays();
            mainMenu.classList.remove('hidden');
            scoreDisplay.style.display = 'none';
            modeIndicator.style.display = 'none';
            menuBtn.style.display = 'none';
            footer.style.display = 'none';
        }

        function handleTouchStart(e) {
            e.preventDefault();
            initAudio();
            if (gameState !== GameState.PLAYING) return;
            const container = canvas.parentElement;
            const w = container.clientWidth;
            for (let touch of e.changedTouches) {
                const x = touch.clientX - container.getBoundingClientRect().left;
                if (x < w / 2) { touchLeft.active = true; touchLeft.y = touch.clientY; }
                else { touchRight.active = true; touchRight.y = touch.clientY; }
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (gameState !== GameState.PLAYING) return;
            const container = canvas.parentElement;
            const w = container.clientWidth;
            for (let touch of e.changedTouches) {
                const x = touch.clientX - container.getBoundingClientRect().left;
                if (x < w / 2 && touchLeft.active) touchLeft.y = touch.clientY;
                else if (x >= w / 2 && touchRight.active) touchRight.y = touch.clientY;
            }
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            const container = canvas.parentElement;
            const w = container.clientWidth;
            for (let touch of e.changedTouches) {
                const x = touch.clientX - container.getBoundingClientRect().left;
                if (x < w / 2) touchLeft.active = false;
                else touchRight.active = false;
            }
        }

        function updatePaddles(dt) {
            const container = canvas.parentElement;
            const h = container.clientHeight;

            if (gameMode === 'com') {
                const aiTarget = ballY - paddleHeight / 2;
                const aiError = (Math.random() - 0.5) * paddleHeight * difficulty.errorMargin;
                paddle2TargetY = aiTarget + aiError;
            }

            if (touchLeft.active) paddle1TargetY = touchLeft.y - paddleHeight / 2;
            if (touchRight.active) paddle2TargetY = touchRight.y - paddleHeight / 2;

            const paddleSpeed = ballSpeed * difficulty.reactionSpeed;
            paddle1Y += (paddle1TargetY - paddle1Y) * Math.min(1, paddleSpeed * dt / 1000);
            paddle2Y += (paddle2TargetY - paddle2Y) * Math.min(1, paddleSpeed * dt / 1000);

            paddle1Y = Math.max(0, Math.min(h - paddleHeight, paddle1Y));
            paddle2Y = Math.max(0, Math.min(h - paddleHeight, paddle2Y));

            if (gameMode === 'online') {
                // Host controls left paddle (paddle1), guest controls right paddle (paddle2)
                if (isHost) {
                    sendOnline({ type: 'input', y: paddle1Y });
                } else {
                    // Guest sends their paddle position
                    sendOnline({ type: 'input', y: paddle2Y });
                }
            }
        }

        function updateBall(dt) {
            const container = canvas.parentElement;
            const w = container.clientWidth, h = container.clientHeight;

            ballTrail.unshift({ x: ballX, y: ballY });
            if (ballTrail.length > 5) ballTrail.pop();

            ballX += ballVX * dt / 16;
            ballY += ballVY * dt / 16;

            if (ballY - ballRadius <= 0) { ballY = ballRadius; ballVY = Math.abs(ballVY); playWallBounce(); }
            else if (ballY + ballRadius >= h) { ballY = h - ballRadius; ballVY = -Math.abs(ballVY); playWallBounce(); }

            const paddle1X = paddleWidth;
            if (ballX - ballRadius <= paddle1X + paddleWidth && ballX + ballRadius >= paddle1X && ballY >= paddle1Y && ballY <= paddle1Y + paddleHeight) {
                ballX = paddle1X + paddleWidth + ballRadius;
                const hitPos = (ballY - paddle1Y) / paddleHeight;
                const angle = (hitPos - 0.5) * MAX_BOUNCE_ANGLE;
                ballSpeed = Math.min(ballSpeed * SPEED_INCREMENT, initialBallSpeed * MAX_SPEED_MULTIPLIER);
                ballVX = Math.abs(Math.sin(angle) * ballSpeed);
                ballVY = Math.cos(angle) * ballSpeed;
                playPaddleHit();
            }

            const paddle2X = w - paddleWidth * 2;
            if (ballX + ballRadius >= paddle2X && ballX - ballRadius <= paddle2X + paddleWidth && ballY >= paddle2Y && ballY <= paddle2Y + paddleHeight) {
                ballX = paddle2X - ballRadius;
                const hitPos = (ballY - paddle2Y) / paddleHeight;
                const angle = (hitPos - 0.5) * MAX_BOUNCE_ANGLE;
                ballSpeed = Math.min(ballSpeed * SPEED_INCREMENT, initialBallSpeed * MAX_SPEED_MULTIPLIER);
                ballVX = -Math.abs(Math.sin(angle) * ballSpeed);
                ballVY = Math.cos(angle) * ballSpeed;
                playPaddleHit();
            }

            // Only host manages scoring logic
            if (gameMode !== 'online' || isHost) {
                let scored = false, lastScorer = 0;
                if (ballX < -ballRadius) { score.p2++; updateScoreDisplay(); playScore(); scored = true; lastScorer = 2; }
                else if (ballX > w + ballRadius) { score.p1++; updateScoreDisplay(); playScore(); scored = true; lastScorer = 1; }

                if (scored) {
                    if (gameMode === 'online') sendOnline({ type: 'scored', score: { ...score }, lastScorer });
                    checkWin(lastScorer);
                }
            }
        }

        function checkWin(lastScorer) {
            if (score.p1 >= WINNING_SCORE || score.p2 >= WINNING_SCORE) {
                gameState = GameState.GAME_OVER;
                const winner = score.p1 >= WINNING_SCORE ? 1 : 2;
                winnerText.innerHTML = `GANADOR:<br><span class="winner-p${winner}">JUGADOR ${winner}</span>`;
                showOverlay(gameOverMenu);
                playWin();
                if (gameMode === 'online' && isHost) {
                    sendOnline({ type: 'gameover', winner });
                }
            } else {
                gameState = GameState.SCORED;
                scoredTimer = SCORED_DELAY;
            }
        }

        function endGame(winner) {
            gameState = GameState.GAME_OVER;
            winnerText.innerHTML = `GANADOR:<br><span class="winner-p${winner}">JUGADOR ${winner}</span>`;
            showOverlay(gameOverMenu);
            playWin();
        }

        function updateScoreDisplay() { scoreP1El.textContent = score.p1; scoreP2El.textContent = score.p2; }

        function draw() {
            const container = canvas.parentElement;
            const w = container.clientWidth, h = container.clientHeight;
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, w, h);

            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h);
            ctx.stroke();
            ctx.setLineDash([]);

            if (gameState === GameState.PLAYING) {
                ctx.fillStyle = 'rgba(0, 255, 136, 0.03)';
                ctx.fillRect(0, 0, w / 2, h);
                ctx.fillStyle = 'rgba(255, 107, 107, 0.03)';
                ctx.fillRect(w / 2, 0, w / 2, h);
            }

            ballTrail.forEach((pos, i) => {
                const alpha = (1 - i / ballTrail.length) * 0.3;
                const radius = ballRadius * (1 - i / ballTrail.length * 0.5);
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            });

            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 10;
            ctx.fillRect(paddleWidth, paddle1Y, paddleWidth, paddleHeight);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fillRect(w - paddleWidth * 2, paddle2Y, paddleWidth, paddleHeight);
            ctx.shadowBlur = 0;
        }

        function gameLoop(timestamp) {
            if (gameState === GameState.MENU || gameState === GameState.GAME_OVER) return;
            const dt = Math.min(timestamp - lastTime, 50);
            lastTime = timestamp;

            if (gameState === GameState.SCORED) {
                scoredTimer -= dt;
                if (scoredTimer <= 0) { resetBall(); gameState = GameState.PLAYING; }
            }

            if (gameState === GameState.PLAYING) {
                updatePaddles(dt);
                updateBall(dt);

                // Host sends periodic sync to guest
                if (gameMode === 'online' && isHost && timestamp - lastSyncTime > SYNC_INTERVAL) {
                    sendFullSync();
                    lastSyncTime = timestamp;
                }
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('load', () => {
            console.log('Window loaded');
            initDOM();
            console.log('DOM initialized, roomCodeEl:', roomCodeEl);
            resize();
            window.addEventListener('resize', resize);

            // Splash screen
            const splashScreen = document.getElementById('splashScreen');
            setTimeout(() => {
                splashScreen.style.display = 'none';
                showOverlay(mainMenu);
            }, 2500);
        });
    </script>
</body>
</html>
